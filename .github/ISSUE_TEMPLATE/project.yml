name: "🏆 Project Submission"
description: "Submit your Agent Academy Live Challenge Contest project to showcase your work and compete for recognition!"
title: "Project: [Track] - [Your Project Name]"
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🎉 Thank you for participating in the Agent Academy Live Challenge Contest!

        ![Agent Academy Live Banner](https://github.com/microsoft/agent-academy/raw/hackathon/hackathon/assets/banner.png)

        PLEASE READ THOROUGHLY BEFORE ENTERING THE CONTEST

        **ELIGIBILITY**

        Open to any registered attendee 18 years of age or older. If you are 18 years of age or older but have not reached the age of majority in your legal place of residence, then you must have consent of a parent/legal guardian.

        Employees and directors of Microsoft Corporation and its subsidiaries, affiliates, advertising agencies, and Contest Parties are not eligible, nor are persons involved in the execution or administration of this Contest, or the family members of each above (parents, children, siblings, spouse/domestic partners, or individuals residing in the same household). Void in Cuba, Iran, North Korea, Sudan, Syria, Region of Crimea, Russia, and where otherwise prohibited by law.

        **ENTRY REQUIREMENTS**

        To be eligible, an entry must meet the following content/technical requirements:
        - Your entry must be your own original work
        - The demo video portion of your entry must be solely your own work
        - Your entry cannot have been selected as a winner in any other contest
        - You must have obtained all consents, approvals, or licenses required for you to submit your entry
        - Entrants warrant that their entry is their original work, has not been copied from others without permission or apparent rights, and does not violate the privacy, intellectual property rights, or other rights of any other person or entity
        - You may include Microsoft trademarks, logos, and designs, for which Microsoft grants you a limited license to use for the sole purposes of submitting an entry into this Contest
        - Your entry may NOT contain any content that is obscene or offensive, violent, defamatory, disparaging, or illegal, or that promotes alcohol, illegal drugs, tobacco or a particular political agenda, or that communicates messages that may reflect negatively on the goodwill of Microsoft

        **ENTRY LIMITS**

        The entry limit is one (1) per Track and two (2) overall during the Entry Period. Any attempt to obtain more than the stated number of entries by using multiple/different accounts, email addresses, identities, registrations, logins, or any other methods will void your entries and you may be disqualified. Use of any automated system to participate is prohibited.

        **MICROSOFT ECOSYSTEM REQUIREMENT**

        Each agent must use at least one (1) of the following Microsoft products and services:
        - Microsoft Copilot Studio
        - Azure OpenAI Service
        - Microsoft Graph API
        - Power Automate

        Please contact poweradvocates@microsoft.com with questions.

        **PRIVACY** Personal data you provide while entering this Contest will be used by Microsoft and/or its agents only for the administration and operation of this Contest and in accordance with the [Microsoft Privacy Statement](https://privacy.microsoft.com/en-us/privacystatement).

        **Official Rules** Official contest rules are available here: https://aka.ms/agentacademy/terms

        ---

        Please fill out this form completely to submit your project. All fields marked as required must be completed for evaluation.

        **Submission Deadline**: June 2, 2026 (11:59 PM PT)

        ⚠️ **Important**: Before submitting, please read our [Disclaimer](https://github.com/microsoft/agent-academy/blob/main/hackathon/DISCLAIMER.md). Do NOT upload any confidential, proprietary, or sensitive information.

  - type: dropdown
    id: privacy
    attributes:
      label: I agree to allow Microsoft to contact me about my responses and Feedback
      description: I agree to allow Microsoft to contact me about my responses and Feedback
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: dropdown
    id: track
    attributes:
      label: Participation Track
      description: "Which track are you competing in? Entry limit: 1 per Track, 2 overall."
      options:
        - "Recruit (Beginner) — https://microsoft.github.io/agent-academy/recruit/"
        - "Operative (Intermediate) — https://microsoft.github.io/agent-academy/operative/"
        - "Special Ops (Advanced) — https://microsoft.github.io/agent-academy/special-ops/"
        - "Cowork Collective (Collaborative) — https://microsoft.github.io/agent-academy/cowork-collective/"
    validations:
      required: true

  - type: input
    id: project-name
    attributes:
      label: Project Name
      description: What is your project called?
      placeholder: "e.g., Smart HR Onboarding Agent, Customer Support Orchestrator"
    validations:
      required: true

  - type: input
    id: github-username
    attributes:
      label: GitHub Username
      description: Your GitHub username
      placeholder: "@username"
    validations:
      required: true

  - type: input
    id: repo-url
    attributes:
      label: Repository URL
      description: Link to your public GitHub repository with the project code
      placeholder: "https://github.com/username/project-name"
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: What problem does your agent solve? Who is the target user?
      placeholder: |
        Describe the problem your agent addresses.
        Who benefits from this solution?
        What does success look like?
    validations:
      required: true

  - type: textarea
    id: agent-academy-modules
    attributes:
      label: Agent Academy Modules or Concepts Used
      description: Which Agent Academy patterns and concepts did you apply in your project?
      placeholder: |
        - Module/concept name — how you applied it
        - Module/concept name — how you applied it
    validations:
      required: true

  - type: textarea
    id: architecture
    attributes:
      label: Architecture Overview
      description: Provide a diagram (image link) or written description of your agent's architecture
      placeholder: |
        Describe or link to your architecture diagram.
        Include key components, data flow, and integration points.
    validations:
      required: true

  - type: textarea
    id: demo-video
    attributes:
      label: Demo Video (5 minutes or less)
      description: Provide a link to your demo video showing the agent in action. Video must be no longer than 5 minutes.
      placeholder: |
        Demo Video: https://youtu.be/your-video

        Optional additional materials:
        Screenshots: https://github.com/username/project/tree/main/screenshots
        Live Demo: https://your-app.com
    validations:
      required: true

  - type: dropdown
    id: tech-stack
    attributes:
      label: Primary Programming Language
      options:
        - Python
        - TypeScript/JavaScript
        - C#/.NET
        - Java
        - Power Platform / Low-Code
        - Other
    validations:
      required: true

  - type: textarea
    id: technologies
    attributes:
      label: Key Technologies Used
      description: "List the main technologies, frameworks, and services used. Must include at least one: Microsoft Copilot Studio, Azure OpenAI Service, Microsoft Graph API, or Power Automate."
      placeholder: |
        - Microsoft Copilot Studio
        - Azure OpenAI Service
        - Microsoft Graph API
        - Power Automate
    validations:
      required: true

  - type: dropdown
    id: submission-type
    attributes:
      label: Submission Type
      description: Are you submitting as an individual or as a team?
      options:
        - Individual
        - Team (2-4 members)
    validations:
      required: true

  - type: textarea
    id: team-members
    attributes:
      label: Team Members
      description: If submitting as a team, list all team members with their GitHub usernames
      placeholder: |
        - @teammate1 - Role (e.g., Backend Developer)
        - @teammate2 - Role (e.g., Frontend Developer)
    validations:
      required: false

  - type: textarea
    id: curriculum-worked-well
    attributes:
      label: What Worked Well Using the Agent Academy Curriculum
      description: Help us improve! What parts of the curriculum were most useful for your project?
      placeholder: |
        Which modules or concepts helped you the most?
        What was clear and easy to apply?
    validations:
      required: true

  - type: textarea
    id: curriculum-feedback
    attributes:
      label: What Was Unclear or Difficult in the Curriculum
      description: Help us improve! What could be better in the Agent Academy curriculum?
      placeholder: |
        Which parts were confusing or hard to apply?
        What was missing that would have helped?
    validations:
      required: true

  - type: checkboxes
    id: requirements
    attributes:
      label: Submission Requirements
      description: Please confirm that your submission meets all requirements
      options:
        - label: My project demonstrates one or more Agent Academy concepts or patterns
          required: true
        - label: My agent uses at least one Microsoft product/service (Copilot Studio, Azure OpenAI, Graph API, or Power Automate)
          required: true
        - label: My repository includes a comprehensive README.md with setup instructions
          required: true
        - label: My code does not contain hardcoded API keys or secrets
          required: true
        - label: I have included a demo video (5 minutes or less)
          required: true
        - label: My project is my own original work with proper attribution for any third-party code
          required: true
        - label: I agree to the [Code of Conduct](https://github.com/microsoft/agent-academy/blob/main/CODE_OF_CONDUCT.md)
          required: true
        - label: I have read and agree to the [Disclaimer](https://github.com/microsoft/agent-academy/blob/main/hackathon/DISCLAIMER.md)
          required: true
        - label: I have read and agree to the [Official Contest Rules](https://aka.ms/agentacademy/terms)
          required: true
        - label: My submission does NOT contain any confidential, proprietary, or sensitive information
          required: true
        - label: I confirm I have the rights to submit this content and grant the necessary licenses
          required: true

  - type: textarea
    id: setup-instructions
    attributes:
      label: Quick Setup Summary
      description: Brief summary of how to run your project (evaluators will refer to your README for full details)
      placeholder: |
        1. Clone the repo
        2. Install dependencies: npm install / pip install -r requirements.txt
        3. Configure environment variables (see .env.example)
        4. Run: npm start / python app.py
    validations:
      required: true

  - type: textarea
    id: highlights
    attributes:
      label: Technical Highlights
      description: What are you most proud of in your implementation? What interesting technical decisions did you make?
      placeholder: |
        - Implemented multi-step reasoning pattern for complex queries
        - Built custom orchestration layer connecting multiple agent skills
        - Designed guardrails for enterprise data handling
    validations:
      required: true

  - type: textarea
    id: challenges
    attributes:
      label: Challenges & Learnings
      description: What challenges did you face and what did you learn?
      placeholder: Share your biggest challenge and how you solved it, or key learnings from building this project
    validations:
      required: false

  - type: input
    id: contact
    attributes:
      label: Contact Information
      description: Email or LinkedIn (for winner notifications)
      placeholder: "email@example.com or linkedin.com/in/yourprofile"
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country/Region
      description: Your country or region (for prize eligibility verification)
      placeholder: "e.g., United States, United Kingdom, India"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

        ## 📋 What Happens Next?

        1. **Judging Window**: Winners will be selected within 14 days following the Entry Period close (June 2, 2026)
        2. **Winner Notification**: Within 7 days of judging
        3. **Prizes Sent**: Within 28 days of winner selection

        **Judging Criteria:**
        - 25% — Accuracy & Relevance (meets challenge requirements)
        - 25% — Technical Execution (clear problem-solving approach)
        - 15% — Creativity & Originality (novel ideas or unexpected execution)
        - 15% — User Experience & Presentation (clear, polished, demoable)
        - 10% — Reliability & Safety (solid patterns, avoids obvious pitfalls)
        - 10% — Use Case Impact (most impactful use case)

        **Prizes per Track:** 🥇 $1,500 | 🥈 $1,000 | 🥉 $500 (Microsoft Store Gift Cards)

        **Good luck! 🚀**
