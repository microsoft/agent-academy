name: "🏆 Project Submission"
description: "Submit your Agent Academy Live Hackathon project to showcase your work and compete for recognition!"
title: "Project: [Track] - [Your Project Name]"
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🎉 Thank you for participating in the Agent Academy Live Hackathon!

        
        
        PLEASE READ THOROUGHLY BEFORE ENTERING THE CONTEST 
        
        Open to any registered Event attendee 18 years of age or older . If you are 18 years of age or older but have not reached the age of majority in your legal place of residence, then you must have consent of a parent/legal guardian. 
        
        Employees and directors of Microsoft Corporation and its subsidiaries, affiliates, advertising agencies, and Contest Parties are eligible to SUBMIT but NOT eligible to WIN, nor are persons involved in the execution or administration of this promotion, or the family members of each above (parents, children, siblings, spouse/domestic partners, or individuals residing in the same household). 
        
        Not eligible in Cuba, Iran, North Korea, Sudan, Syria, Region of Crimea, Russia.
        
        For business/tradeshow events- If you are attending the Event in your capacity as an employee, it is your sole responsibility to comply with your employer’s gift policies. Microsoft will not be party to any disputes or actions related to this matter. 
        
        GOVERNMENT EMPLOYEES INCLUDING EDUCATORS- Microsoft is committed to complying with government gift and ethics rules and therefore government and public sector employees are not eligible for this promotion.   
        
        To be eligible, an entry must meet the following content/technical requirements: Your entry must be your own original work; and your entry cannot have been selected as a winner in this contest; and you must have obtained all consents, approvals, or licenses required for you to submit your entry; and · To the extent that entry requires the submission of user-generated content such as software, photos, videos, music, artwork, essays, etc., entrants warrant that their entry is their original work, has not been copied from others without permission or apparent rights, and does not violate the privacy, intellectual property rights, or other rights of any other person or entity. You may include Microsoft trademarks, logos, and designs, for which Microsoft grants you a limited license to use for the sole purposes of submitting an entry into this Contes if applicable; and · your entry may NOT contain, as determined by us in our sole and absolute discretion, any content that is obscene or offensive, violent, defamatory, disparaging or illegal, or that promotes alcohol, illegal drugs, tobacco or a particular political agenda, or that communicates messages that may reflect negatively on the goodwill of Microsoft.    
        
        Please contact poweradvocates@microsoft.com with questions. 
        
        **PRIVACY** Your privacy is important to us. Your personal data is never shared outside the company without your permission. For more information about Microsoft's Privacy Practices, see http://go.microsoft.com/fwlink/?LinkId=521839
        
        **Official Rules** Official game rules are available here- https://aka.ms/agentacademy/terms

        
        
        Please fill out this form completely to submit your project. All fields marked as required must be completed for evaluation.
        
        **Submission Deadline**: May 30, 2026 (11:59 PM PT)
        
        ⚠️ **Important**: Before submitting, please read our [Disclaimer](https://github.com/microsoft/agent-academy/blob/main/hackathon/DISCLAIMER.md). Do NOT upload any confidential, proprietary, or sensitive information.

  
  - type: dropdown
    id: privacy
    attributes:
      label: I agree to allow Microsoft to contact me about my responses and Feedback
      description: I agree to allow Microsoft to contact me about my responses and Feedback 
      options: 
        - Yes 
        - No 
    validations:
      required: true
      
  - type: dropdown
    id: track
    attributes:
      label: Participation Track
      description: Which starting level are you competing at?
      options:
        - Recruit (Beginner)
        - Operative (Intermediate)
    validations:
      required: true

  - type: input
    id: project-name
    attributes:
      label: Project Name
      description: What is your project called?
      placeholder: "e.g., Smart HR Onboarding Agent, Customer Support Orchestrator"
    validations:
      required: true

  - type: input
    id: github-username
    attributes:
      label: GitHub Username
      description: Your GitHub username
      placeholder: "@username"
    validations:
      required: true

  - type: input
    id: repo-url
    attributes:
      label: Repository URL
      description: Link to your public GitHub repository with the project code
      placeholder: "https://github.com/username/project-name"
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: What problem does your agent solve? Who is the target user?
      placeholder: |
        Describe the problem your agent addresses.
        Who benefits from this solution?
        What does success look like?
    validations:
      required: true

  - type: textarea
    id: agent-academy-modules
    attributes:
      label: Agent Academy Modules or Concepts Used
      description: Which Agent Academy patterns and concepts did you apply in your project?
      placeholder: |
        - Module/concept name — how you applied it
        - Module/concept name — how you applied it
    validations:
      required: true

  - type: textarea
    id: architecture
    attributes:
      label: Architecture Overview
      description: Provide a diagram (image link) or written description of your agent's architecture
      placeholder: |
        Describe or link to your architecture diagram.
        Include key components, data flow, and integration points.
    validations:
      required: true

  - type: textarea
    id: demo-video
    attributes:
      label: Demo Video (5 minutes or less)
      description: Provide a link to your demo video showing the agent in action
      placeholder: |
        Demo Video: https://youtu.be/your-video
        
        Optional additional materials:
        Screenshots: https://github.com/username/project/tree/main/screenshots
        Live Demo: https://your-app.com
    validations:
      required: true

  - type: dropdown
    id: tech-stack
    attributes:
      label: Primary Programming Language
      options:
        - Python
        - TypeScript/JavaScript
        - C#/.NET
        - Java
        - Power Platform / Low-Code
        - Other
    validations:
      required: true

  - type: textarea
    id: technologies
    attributes:
      label: Key Technologies Used
      description: List the main technologies, frameworks, and services used in your project
      placeholder: |
        - Microsoft Copilot Studio
        - Azure OpenAI Service
        - Microsoft Graph API
        - Power Automate
    validations:
      required: true

  - type: dropdown
    id: submission-type
    attributes:
      label: Submission Type
      description: Are you submitting as an individual or as a team?
      options:
        - Individual
        - Team (2-4 members)
    validations:
      required: true

  - type: textarea
    id: team-members
    attributes:
      label: Team Members
      description: If submitting as a team, list all team members with their GitHub usernames
      placeholder: |
        - @teammate1 - Role (e.g., Backend Developer)
        - @teammate2 - Role (e.g., Frontend Developer)
    validations:
      required: false

  - type: textarea
    id: curriculum-worked-well
    attributes:
      label: What Worked Well Using the Agent Academy Curriculum
      description: Help us improve! What parts of the curriculum were most useful for your project?
      placeholder: |
        Which modules or concepts helped you the most?
        What was clear and easy to apply?
    validations:
      required: true

  - type: textarea
    id: curriculum-feedback
    attributes:
      label: What Was Unclear or Difficult in the Curriculum
      description: Help us improve! What could be better in the Agent Academy curriculum?
      placeholder: |
        Which parts were confusing or hard to apply?
        What was missing that would have helped?
    validations:
      required: true

  - type: checkboxes
    id: requirements
    attributes:
      label: Submission Requirements
      description: Please confirm that your submission meets all requirements
      options:
        - label: My project demonstrates one or more Agent Academy concepts or patterns
          required: true
        - label: My repository includes a comprehensive README.md with setup instructions
          required: true
        - label: My code does not contain hardcoded API keys or secrets
          required: true
        - label: I have included a demo video (5 minutes or less)
          required: true
        - label: My project is my own work with proper attribution for any third-party code
          required: true
        - label: I agree to the [Code of Conduct](https://github.com/microsoft/agent-academy/blob/main/CODE_OF_CONDUCT.md)
          required: true
        - label: I have read and agree to the [Disclaimer](https://github.com/microsoft/agent-academy/blob/main/hackathon/DISCLAIMER.md)
          required: true
        - label: My submission does NOT contain any confidential, proprietary, or sensitive information
          required: true
        - label: I confirm I have the rights to submit this content and grant the necessary licenses
          required: true

  - type: textarea
    id: setup-instructions
    attributes:
      label: Quick Setup Summary
      description: Brief summary of how to run your project (evaluators will refer to your README for full details)
      placeholder: |
        1. Clone the repo
        2. Install dependencies: npm install / pip install -r requirements.txt
        3. Configure environment variables (see .env.example)
        4. Run: npm start / python app.py
    validations:
      required: true

  - type: textarea
    id: highlights
    attributes:
      label: Technical Highlights
      description: What are you most proud of in your implementation? What interesting technical decisions did you make?
      placeholder: |
        - Implemented multi-step reasoning pattern for complex queries
        - Built custom orchestration layer connecting multiple agent skills
        - Designed guardrails for enterprise data handling
    validations:
      required: true

  - type: textarea
    id: challenges
    attributes:
      label: Challenges & Learnings
      description: What challenges did you face and what did you learn?
      placeholder: Share your biggest challenge and how you solved it, or key learnings from building this project
    validations:
      required: false

  - type: input
    id: contact
    attributes:
      label: Contact Information
      description: Email or LinkedIn (optional, for winner notifications)
      placeholder: "email@example.com or linkedin.com/in/yourprofile"
    validations:
      required: false

  - type: input
    id: country
    attributes:
      label: Country/Region
      description: Your country or region (for prize eligibility verification)
      placeholder: "e.g., United States, United Kingdom, India"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        
        ## 📋 What Happens Next?
        
        1. **Judging Window** (May 31 – June 9): Our judges will review and score your submission
        2. **Winners Finalized**: June 10, 2026
        3. **Winners Announced**: June 12, 2026
        
        **Good luck! 🚀**
